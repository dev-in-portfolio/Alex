<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Alex 35</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

  <div class="preloader" id="preloader">
    <div class="preloader-ring"></div>
  </div>

  <canvas id="canvas-bg"></canvas>

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">A<span></span>LEX</a>
    <button class="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="party.html">Party</a></li>
      <li><a href="funny.html">Funny</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header gallery-hero">
      <h1>Gallery</h1>
      <p>Loading Alex's album vault.</p>
      <div class="gallery-source" id="gallerySource">Fetching media manifest…</div>
    </div>

    <section class="section gallery-shell">
      <div class="gallery-status" id="galleryStatus" aria-live="polite">Preparing gallery…</div>

      <div class="gallery-layout">
        <aside class="gallery-sidebar">
          <div class="gallery-panel-header">
            <span class="section-label">Albums</span>
            <h2>Choose a set</h2>
          </div>
          <div class="album-list" id="albumList"></div>
        </aside>

        <section class="gallery-main" aria-labelledby="activeAlbumTitle">
          <div class="gallery-panel-header">
            <span class="section-label">Photos</span>
            <h2 id="activeAlbumTitle">Waiting for gallery data</h2>
            <p id="activeAlbumMeta">Select an album to view photos.</p>
            <p id="activeAlbumEraDescription" class="gallery-era-description"></p>
          </div>

          <div class="photo-grid" id="photoGrid"></div>
        </section>
      </div>
    </section>
  </main>

  <div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true">
    <button class="gallery-lightbox-close" id="lightboxClose" aria-label="Close photo viewer">×</button>
    <button class="gallery-lightbox-nav gallery-lightbox-prev" id="lightboxPrev" aria-label="Previous photo">‹</button>
    <figure class="gallery-lightbox-frame">
      <img id="lightboxImage" alt="">
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
    <button class="gallery-lightbox-nav gallery-lightbox-next" id="lightboxNext" aria-label="Next photo">›</button>
  </div>

  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
