<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funny — Alex 35</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <style>
    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.16), transparent 38%),
        linear-gradient(180deg, #020202 0%, #060606 100%);
      overflow: hidden;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 9999;
      background:
        radial-gradient(circle at center, rgba(212, 175, 55, 0.16), transparent 28%),
        rgba(0, 0, 0, 0.96);
      user-select: none;
    }

    .stack {
      display: grid;
      justify-items: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      max-width: 720px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      color: var(--gold-light);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-weight: 800;
      line-height: 0.95;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    }

    .sub {
      color: var(--text-secondary);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      max-width: 36rem;
      line-height: 1.6;
    }

    #startBtn {
      cursor: pointer;
      border: 1px solid rgba(245, 230, 163, 0.5);
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.9), rgba(166, 123, 0, 0.92));
      color: #050505;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.95rem 1.4rem;
      border-radius: 999px;
      font-size: 0.9rem;
      width: min(360px, 78vw);
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 0 35px rgba(212, 175, 55, 0.22);
    }

    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.35);
    }

    #playerWrap {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 1;
      background: #000;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #closeBtn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10000;
      border: 1px solid rgba(245, 230, 163, 0.6);
      background: rgba(3, 3, 3, 0.65);
      color: var(--gold-light);
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      display: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #closeBtn:hover {
      background: rgba(212, 175, 55, 0.12);
    }

    .overlay-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(212, 175, 55, 0.18);
      color: var(--gold-light);
      background: rgba(212, 175, 55, 0.05);
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">A<span></span>LEX</a>
    <button class="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="dj.html">DJ Booth</a></li>
      <li><a href="memories.html">Memories</a></li>
      <li><a href="party.html">Party</a></li>
      <li><a href="funny.html">Funny</a></li>
    </ul>
  </nav>

  <div id="playerWrap">
    <div id="player"></div>
  </div>

  <div id="overlay" role="button" tabindex="0" aria-label="Start the video trap">
    <div class="stack">
      <div class="overlay-chip">Do Not Press</div>
      <div class="title">Do Not Press</div>
      <p class="sub">The button is here because curiosity always wins. Tap it if you want a very committed birthday prank with sound.</p>
      <button id="startBtn" type="button">Press Anyway</button>
    </div>
  </div>

  <button id="closeBtn" type="button">Close</button>

  <script>
    const VIDEO_ID = 'eBGIQ7ZuuiU';
    const DODGE_DISTANCE = 140;
    const JUMP_PAD = 18;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player = null;
    let started = false;

    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const playerWrap = document.getElementById('playerWrap');
    const closeBtn = document.getElementById('closeBtn');

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        videoId: VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
        },
      });
    };

    function startVideoFromUserGesture() {
      if (!player) {
        return;
      }
      if (started) return;
      started = true;

      playerWrap.style.display = 'block';
      overlay.style.display = 'none';
      closeBtn.style.display = 'block';

      try {
        player.unMute();
        player.setVolume(100);
        player.playVideo();
      } catch (error) {
        started = false;
        overlay.style.display = 'grid';
        closeBtn.style.display = 'none';
        playerWrap.style.display = 'none';
      }
    }

    overlay.addEventListener('click', startVideoFromUserGesture);
    startBtn.addEventListener('click', startVideoFromUserGesture);
    overlay.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        startVideoFromUserGesture();
      }
    });

    closeBtn.addEventListener('click', () => {
      try {
        player.stopVideo();
      } catch (error) {}
      started = false;
      playerWrap.style.display = 'none';
      closeBtn.style.display = 'none';
      overlay.style.display = 'grid';
    });

    function moveCloseButtonRandomly() {
      const bw = closeBtn.offsetWidth || 120;
      const bh = closeBtn.offsetHeight || 44;
      const maxX = window.innerWidth - bw - JUMP_PAD;
      const maxY = window.innerHeight - bh - JUMP_PAD;
      const x = Math.max(JUMP_PAD, Math.floor(Math.random() * Math.max(maxX, 1)));
      const y = Math.max(JUMP_PAD, Math.floor(Math.random() * Math.max(maxY, 1)));
      closeBtn.style.left = `${x}px`;
      closeBtn.style.top = `${y}px`;
      closeBtn.style.right = 'auto';
    }

    document.addEventListener('mousemove', (event) => {
      if (closeBtn.style.display !== 'block') return;
      const rect = closeBtn.getBoundingClientRect();
      const dx = event.clientX - (rect.left + rect.width / 2);
      const dy = event.clientY - (rect.top + rect.height / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < DODGE_DISTANCE) moveCloseButtonRandomly();
    });

    closeBtn.addEventListener('touchstart', (event) => {
      event.preventDefault();
      moveCloseButtonRandomly();
    }, { passive: false });
  </script>

  <script src="js/main.js"></script>
</body>
</html>
