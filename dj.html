<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Booth — Alex 35</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

  <div class="preloader" id="preloader">
    <div class="preloader-ring"></div>
  </div>

  <canvas id="canvas-bg"></canvas>

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">A<span></span>LEX</a>
    <button class="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="dj.html">DJ Booth</a></li>
      <li><a href="memories.html">Memories</a></li>
      <li><a href="funny.html">Funny</a></li>
      <li><a href="wishes.html">Wishes</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <h1>DJ Booth</h1>
      <p>Spin the tracks</p>
    </div>

    <section class="section" style="padding-top: 2rem;">
      <div class="dj-wrapper">
        <div class="dj-player">
          <div class="vinyl-container">
            <div class="vinyl-disc"></div>
            <canvas id="circularViz"></canvas>
            <div class="vinyl-strobe"></div>
          </div>

          <div class="song-info">
            <div class="song-artist-label">Now Playing</div>
            <div class="song-name-display" id="songNameDisplay">Select a track</div>
          </div>

          <div class="controls">
            <button class="ctrl-btn" id="prevBtn" title="Previous">⏮</button>
            <button class="ctrl-btn play-ctrl" id="playBtn" title="Play/Pause">▶</button>
            <button class="ctrl-btn" id="nextBtn" title="Next">⏭</button>
          </div>

          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>
          </div>

          <div class="volume-area">
            <span style="font-size:0.8rem;opacity:0.4">🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            <span style="font-size:0.9rem;opacity:0.4">🔊</span>
          </div>
        </div>

        <div class="songs-panel">
          <h3>Tracklist</h3>
          <div id="songList"></div>
          <p style="color:var(--text-muted);font-size:0.7rem;margin-top:1.5rem;text-align:center;">
            Demo tracks from SoundHelix — drop your own MP3s in /songs/
          </p>
        </div>
      </div>
    </section>

    <footer class="footer">
      Turn it up <span class="gold">✦</span> Happy 35th
    </footer>
  </main>

  <script src="js/main.js"></script>
  <script src="js/dj.js"></script>
</body>
</html>
